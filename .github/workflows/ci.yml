name: Build and Smoke Test

on:
  pull_request:
    paths:
      - ".github/**"
      - "docs/**"
      - "opencarwings/**"
      - "scripts/**"
  push:
    paths:
      - ".github/**"
      - "docs/**"
      - "opencarwings/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: opencarwings-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source without publish credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate app metadata and deployment script syntax
        shell: bash
        run: |
          set -euo pipefail
          ruby .github/scripts/validate-metadata.rb
          pwsh -NoProfile -Command '$tokens = $null; $errors = $null; [System.Management.Automation.Language.Parser]::ParseFile("scripts/deploy-opencarwings-dev.ps1", [ref]$tokens, [ref]$errors) | Out-Null; if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_.Message }; exit 1 }'

      - name: Read and validate app version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(sed -nE 's/^version: "([^"]+)"$/\1/p' opencarwings/config.yaml)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$ ]]; then
            echo "Invalid app version: $VERSION" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and smoke-test amd64 image
        run: .github/scripts/build-smoke-test.sh "${{ steps.version.outputs.value }}"
