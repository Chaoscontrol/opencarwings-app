name: Sync Upstream

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: opencarwings-release
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify release source
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          test -z "$(git status --porcelain)"

      - name: Check for upstream changes
        id: check_upstream
        run: |
          set -euo pipefail
          LATEST_UPSTREAM=$(git ls-remote \
            https://github.com/developerfromjokela/opencarwings.git \
            refs/heads/main | awk 'NR == 1 { print $1 }')
          if [ "$(wc -l < opencarwings/.upstream_sync)" -ne 1 ]; then
            echo "opencarwings/.upstream_sync must contain exactly one line" >&2
            exit 1
          fi
          LAST_SYNC=$(cat opencarwings/.upstream_sync)

          if [[ ! "$LATEST_UPSTREAM" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Upstream main did not resolve to a valid commit SHA" >&2
            exit 1
          fi
          if [[ ! "$LAST_SYNC" =~ ^[0-9a-f]{40}$ ]]; then
            echo "opencarwings/.upstream_sync is not a valid commit SHA" >&2
            exit 1
          fi

          echo "last_sync=$LAST_SYNC" >> "$GITHUB_OUTPUT"
          echo "latest_upstream=$LATEST_UPSTREAM" >> "$GITHUB_OUTPUT"
          if [ "$LAST_SYNC" = "$LATEST_UPSTREAM" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream changes"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "New upstream changes: $LAST_SYNC -> $LATEST_UPSTREAM"
          fi

      - name: Get verified upstream changelog
        if: steps.check_upstream.outputs.has_changes == 'true'
        env:
          LAST_SYNC: ${{ steps.check_upstream.outputs.last_sync }}
          LATEST_UPSTREAM: ${{ steps.check_upstream.outputs.latest_upstream }}
        run: |
          set -euo pipefail
          git clone --filter=blob:none \
            https://github.com/developerfromjokela/opencarwings.git temp_upstream
          RESOLVED_HEAD=$(git -C temp_upstream rev-parse HEAD)
          if [ "$RESOLVED_HEAD" != "$LATEST_UPSTREAM" ]; then
            echo "Upstream main moved during verification; retry later" >&2
            exit 1
          fi
          git -C temp_upstream cat-file -e "${LAST_SYNC}^{commit}"
          git -C temp_upstream merge-base --is-ancestor "$LAST_SYNC" "$LATEST_UPSTREAM"
          git -C temp_upstream log --pretty=format:'- %s (%h)' \
            "${LAST_SYNC}..${LATEST_UPSTREAM}" > upstream_commits.txt
          test -s upstream_commits.txt
          rm -rf temp_upstream

      - name: Get current version
        if: steps.check_upstream.outputs.has_changes == 'true'
        id: current_version
        run: |
          set -euo pipefail
          VERSION=$(sed -nE 's/^version: "([^"]+)"$/\1/p' opencarwings/config.yaml)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$ ]]; then
            echo "Invalid current version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Bump base version
        if: steps.check_upstream.outputs.has_changes == 'true'
        id: bump_version
        env:
          CURRENT_VERSION: ${{ steps.current_version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9]+)?$ ]]; then
            NEW_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
          else
            echo "Cannot bump invalid version: $CURRENT_VERSION" >&2
            exit 1
          fi
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New upstream version: $NEW_VERSION"

      - name: Update release files
        if: steps.check_upstream.outputs.has_changes == 'true'
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
          LATEST_UPSTREAM: ${{ steps.check_upstream.outputs.latest_upstream }}
        run: |
          set -euo pipefail
          {
            echo "## v${NEW_VERSION} - $(date +%Y-%m-%d) [Upstream Update]"
            echo
            echo "Synced with latest upstream changes from opencarwings repository."
            echo
            cat upstream_commits.txt
            echo
            echo
          } > new_changes.md
          cat new_changes.md opencarwings/CHANGELOG.md > temp.md
          mv temp.md opencarwings/CHANGELOG.md
          sed -i "s/^version: .*/version: \"$NEW_VERSION\"/" opencarwings/config.yaml
          printf '%s\n' "$LATEST_UPSTREAM" > opencarwings/.upstream_sync

      - name: Build and smoke-test amd64 image
        if: steps.check_upstream.outputs.has_changes == 'true'
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: .github/scripts/build-smoke-test.sh "$NEW_VERSION"

      - name: Commit, tag, and atomically publish
        if: steps.check_upstream.outputs.has_changes == 'true'
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: |
          set -euo pipefail
          TAG="v${NEW_VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Remote tag ${TAG} already exists; refusing to overwrite it" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add opencarwings/config.yaml opencarwings/CHANGELOG.md opencarwings/.upstream_sync
          git diff --cached --check
          git diff --cached --quiet && { echo "No release changes to commit" >&2; exit 1; }
          git commit -m "Upstream sync - v${NEW_VERSION}"
          git tag "$TAG"
          git push --atomic origin HEAD:main "refs/tags/${TAG}"
